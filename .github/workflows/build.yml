name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check .

      - name: Typecheck
        run: npm run typecheck

  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: build:linux
          # - os: macos-latest
          #   build_cmd: build:mac
          # - os: windows-latest
          #   build_cmd: build:win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build version
        run: echo "BUILD_VERSION=0.1.0-build.${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Build
        run: npm run ${{ matrix.build_cmd }} -- --publish never --config.extraMetadata.version=${{ env.BUILD_VERSION }}

      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
            dist/*.yml

  release:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (0.1.0-build.${{ github.run_number }})
          body: |
            Rolling release — automatically updated on each push to `main`.

            **Version:** `0.1.0-build.${{ github.run_number }}`
            **Last updated:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
          prerelease: false
          make_latest: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
